<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moment — The Art of the Pause</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0b0a;
            --bg-raised: #141210;
            --sage: #82d9ac;
            --amber: #f0b97a;
            --text: #f3ece4;
            --muted: #a49a92;
            --subtle: #4a443d;
            --border: rgba(255,255,255,0.06);
            --glass: rgba(255,255,255,0.02);
            --glass-thick: rgba(255,255,255,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* ── TEXTURE ── */
        .noise { position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        /* ── MESH ── */
        .mesh-container { position: fixed; inset: 0; z-index: -1; background: var(--bg); overflow: hidden; }
        .mesh-blob { position: absolute; width: 60vw; height: 60vw; border-radius: 50%; filter: blur(120px); opacity: 0.15; animation: drift 20s infinite alternate cubic-bezier(0.45,0,0.55,1); }
        .blob-1 { background: var(--sage); top: -10%; left: -10%; }
        .blob-2 { background: var(--amber); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(10%,10%) scale(1.1); } }

        /* ── CURSOR GLOW ── */
        .cursor-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(130,217,172,0.1) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: -1; transform: translate(-50%,-50%); transition: opacity 1s ease; opacity: 0; }

        /* ── ANIMATIONS ── */
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .float { animation: float 6s ease-in-out infinite; }
        .float-delayed { animation: float 6s ease-in-out infinite; animation-delay: -3s; }
        @keyframes shimmer { 0% { color: var(--text); } 50% { color: var(--amber); filter: drop-shadow(0 0 8px rgba(240,185,122,0.4)); } 100% { color: var(--text); } }
        em { animation: shimmer 4s infinite; }

        /* ── NAV ── */
        nav { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; align-items: center; gap: 32px; padding: 12px 32px; background: rgba(12,11,10,0.8); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 100px; transition: all 0.4s ease; }
        nav:hover { border-color: rgba(255,255,255,0.1); }
        nav a { text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 300; letter-spacing: 0.05em; transition: color 0.3s; cursor: pointer; }
        nav a:hover, nav a.active { color: var(--text); }
        .nav-divider { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }

        /* ── TYPOGRAPHY ── */
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 300; }
        .editorial-caps { font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 24px; display: block; }

        /* ── SECTIONS ── */
        section { min-height: 100vh; padding: 120px 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; max-width: 1200px; margin: 0 auto; position: relative; }

        /* ── HERO ── */
        .hero { text-align: center; }
        .hero h1 { font-size: clamp(48px, 8vw, 96px); line-height: 1; margin-bottom: 24px; letter-spacing: -0.01em; }
        .hero h1 em { font-style: italic; font-weight: 300; color: var(--amber); }
        .hero p { max-width: 600px; font-size: 18px; color: var(--muted); font-weight: 300; margin-bottom: 48px; line-height: 1.6; }

        /* ── MOCKUP ── */
        .mockup-container { width: 100%; max-width: 900px; height: 500px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.6); margin-bottom: 80px; }
        .mockup-base { padding: 40px; opacity: 0.3; filter: blur(4px); pointer-events: none; }
        .mockup-order-card { width: 100%; padding: 20px; background: #fff; color: #000; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .mockup-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(12,11,10,0.9), var(--bg)); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 2; padding: 40px; }
        .mockup-overlay h3 { font-size: 32px; margin-bottom: 12px; }
        .mockup-overlay p { font-size: 14px; color: var(--muted); max-width: 300px; margin-bottom: 24px; }

        /* ── BUTTONS ── */
        .cta-group { display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 16px 36px; border-radius: 100px; font-size: 14px; font-weight: 400; cursor: pointer; text-decoration: none; transition: all 0.3s cubic-bezier(0.23,1,0.32,1); font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); display: inline-block; }
        .btn-prime { background: var(--text); color: var(--bg); border: none; }
        .btn-prime:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(130,217,172,0.15); }
        .btn-ghost { background: transparent; color: var(--text); }
        .btn-ghost:hover { background: var(--glass); border-color: var(--muted); }
        .btn-sage { background: rgba(130,217,172,0.1); color: var(--sage); border-color: rgba(130,217,172,0.3); }
        .btn-sage:hover { background: rgba(130,217,172,0.2); }

        /* ── STORY ── */
        .story { display: grid; grid-template-columns: 1.1fr 1fr; gap: 100px; align-items: center; text-align: left; }
        .story-text h2 { font-size: 56px; line-height: 1.1; margin-bottom: 32px; }
        .story-text h2 em { font-style: italic; color: var(--sage); }
        .story-text p { font-size: 16px; color: var(--muted); margin-bottom: 24px; line-height: 1.8; font-weight: 300; }
        .story-image-wrap { position: relative; }
        .story-image { width: 100%; aspect-ratio: 1/1; background: var(--bg-raised); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        .story-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .image-caption { position: absolute; bottom: -40px; right: 0; font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; color: var(--muted); }

        /* ── TILES ── */
        .tiles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; width: 100%; margin-top: 64px; }
        .tile { padding: 40px; background: var(--glass); border: 1px solid var(--border); transition: all 0.4s ease; }
        .tile:hover { background: var(--glass-thick); border-color: var(--sage); transform: translateY(-4px); }
        .tile-icon { font-size: 32px; margin-bottom: 24px; display: block; }
        .tile h4 { font-family: 'DM Sans', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; color: var(--text); }
        .tile p { font-size: 14px; color: var(--muted); font-weight: 300; }

        /* ── REFLECTION ── */
        .reflection-view { width: 100%; max-width: 1100px; }
        .dash-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 64px; }
        .reflection-grid { display: grid; grid-template-columns: 320px 1fr; gap: 48px; }
        .streak-card { padding: 50px 40px; background: var(--glass); border: 1px solid var(--border); text-align: left; position: relative; }
        .streak-card::after { content: ''; position: absolute; top: 20px; right: 20px; width: 8px; height: 8px; border-radius: 50%; background: var(--sage); box-shadow: 0 0 15px var(--sage); }
        .streak-val { font-family: 'Cormorant Garamond', serif; font-size: 140px; color: var(--sage); line-height: 0.7; margin-bottom: 10px; }
        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 24px; }
        .metric-tile { padding: 32px; background: var(--glass); border: 1px solid var(--border); }
        .mt-val { font-family: 'Cormorant Garamond', serif; font-size: 52px; color: var(--text); line-height: 1; margin-bottom: 8px; }
        .mt-val.amber { color: var(--amber); }
        .timeline-box { padding: 32px; background: var(--glass); border: 1px solid var(--border); margin-top: 24px; }

        /* ── SIGNUP ── */
        .signup-card { width: 100%; max-width: 480px; padding: 60px; background: var(--glass); border: 1px solid var(--border); text-align: left; backdrop-filter: blur(20px); }
        .form-group { margin-bottom: 32px; }
        .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 12px; }
        .form-input { width: 100%; padding: 16px 0; background: transparent; border: none; border-bottom: 1px solid var(--subtle); color: var(--text); font-family: inherit; font-size: 16px; transition: border-color 0.4s; outline: none; }
        .form-input:focus { border-bottom-color: var(--sage); }

        /* ── SETUP VIEW ── */
        .setup-view { width: 100%; max-width: 760px; text-align: center; }
        .setup-steps { display: flex; flex-direction: column; gap: 16px; margin-top: 56px; text-align: left; }
        .setup-step { display: grid; grid-template-columns: 56px 1fr; gap: 28px; align-items: flex-start; padding: 32px 36px; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; transition: all 0.35s ease; }
        .setup-step:hover { background: var(--glass-thick); border-color: rgba(130,217,172,0.15); transform: translateX(4px); }
        .step-num { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; color: var(--subtle); line-height: 1; padding-top: 2px; transition: color 0.35s; }
        .setup-step:hover .step-num { color: var(--sage); }
        .step-icon { font-size: 22px; margin-bottom: 10px; display: block; }
        .step-title { font-size: 14px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
        .step-desc { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.65; }
        .step-code { display: inline-block; padding: 3px 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 5px; font-size: 12px; color: var(--sage); font-family: 'Courier New', monospace; }

        /* ── SETUP TOAST ── */
        #setup-toast { position: fixed; bottom: 32px; left: 32px; z-index: 2000; width: 300px; padding: 24px 28px; background: rgba(20,18,16,0.9); backdrop-filter: blur(24px); border: 1px solid rgba(130,217,172,0.2); border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); opacity: 0; transform: translateY(16px); pointer-events: none; transition: opacity 0.5s cubic-bezier(0.23,1,0.32,1), transform 0.5s cubic-bezier(0.23,1,0.32,1); }
        #setup-toast.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
        .toast-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: var(--sage); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); box-shadow: 0 0 8px var(--sage); flex-shrink: 0; }
        .toast-heading { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--text); margin-bottom: 6px; }
        .toast-sub { font-size: 12px; color: var(--muted); font-weight: 300; margin-bottom: 20px; line-height: 1.5; }
        .toast-actions { display: flex; align-items: center; gap: 12px; }
        .toast-btn { padding: 9px 20px; border-radius: 100px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.25s ease; text-decoration: none; border: 1px solid transparent; }
        .toast-btn-prime { background: rgba(130,217,172,0.12); border-color: rgba(130,217,172,0.3); color: var(--sage); }
        .toast-btn-prime:hover { background: rgba(130,217,172,0.22); }
        .toast-dismiss { background: none; border: none; font-size: 12px; color: var(--subtle); cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0; transition: color 0.2s; }
        .toast-dismiss:hover { color: var(--muted); }
